workflows:
  default-workflow:
    name: Default Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: توليد الهيكل سحابياً
        script: |
          flutter create --org net.drasty --template=app --project-name=drasty_app .
          flutter pub get
      - name: بناء ملف APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*-release.apk
